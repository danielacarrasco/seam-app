<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Seam{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
</head>
<body>

  <nav class="nav">
    <a href="{{ url_for('home.index') }}" class="nav__logo">Seam</a>
    <div class="nav__links">
      <a href="{{ url_for('projects.index') }}" class="nav__link {% if request.blueprint == 'projects' %}nav__link--active{% endif %}">Projects</a>
      <a href="{{ url_for('stash.index') }}" class="nav__link {% if request.blueprint == 'stash' %}nav__link--active{% endif %}">Stash</a>
      <a href="{{ url_for('patterns.index') }}" class="nav__link {% if request.blueprint == 'patterns' %}nav__link--active{% endif %}">Patterns</a>
      <a href="{{ url_for('makes.index') }}" class="nav__link {% if request.blueprint == 'makes' %}nav__link--active{% endif %}">Makes</a>
      <a href="{{ url_for('sketches.index') }}" class="nav__link {% if request.blueprint == 'sketches' %}nav__link--active{% endif %}">Sketches</a>
      <a href="{{ url_for('journal.index') }}" class="nav__link {% if request.blueprint == 'journal' %}nav__link--active{% endif %}">Journal</a>
      <a href="{{ url_for('measurements.index') }}" class="nav__link {% if request.blueprint == 'measurements' %}nav__link--active{% endif %}">Measurements</a>
    </div>
    <a href="{{ url_for('projects.new') }}" class="nav__cta">+ New</a>
  </nav>

  <main class="main">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-stack">
          {% for category, message in messages %}
            <div class="flash flash--{{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
