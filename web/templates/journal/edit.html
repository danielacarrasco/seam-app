{% extends "base.html" %}
{% block title %}Edit entry · Seam{% endblock %}
{% block content %}
<div class="form-page form-page--narrow">
  <p class="breadcrumb"><a href="{{ url_for('journal.detail', entry_id=entry.id) }}">← Entry</a></p>
  <h1 class="page-title">Edit entry</h1>
  <form method="post" action="{{ url_for('journal.update', entry_id=entry.id) }}" class="form journal-form">
    <div class="form__row">
      <div class="form__field">
        <label class="form__label" for="title">Title</label>
        <input class="form__input" type="text" id="title" name="title" value="{{ entry.title or '' }}" />
      </div>
      <div class="form__field">
        <label class="form__label" for="entry_type">Type</label>
        <select class="form__input" id="entry_type" name="entry_type">
          {% for t in entry_types %}
          <option value="{{ t }}" {% if t == entry.entry_type %}selected{% endif %}>{{ t | title }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="form__field">
      <label class="form__label" for="body">Entry</label>
      <textarea class="form__textarea form__textarea--journal" id="body" name="body" rows="14" required>{{ entry.body }}</textarea>
    </div>
    <div class="form__field">
      <label class="form__label" for="tags">Tags</label>
      <input class="form__input" type="text" id="tags" name="tags" value="{{ entry.tags | join(', ') }}" />
    </div>
    <div class="form__actions">
      <button type="submit" class="btn btn--primary">Save changes</button>
      <a href="{{ url_for('journal.detail', entry_id=entry.id) }}" class="btn btn--ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
