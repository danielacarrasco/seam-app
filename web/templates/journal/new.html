{% extends "base.html" %}
{% block title %}New journal entry · Seam{% endblock %}
{% block content %}
<div class="form-page form-page--narrow">
  <p class="breadcrumb"><a href="{{ url_for('journal.index') }}">Journal</a></p>
  <h1 class="page-title">New entry</h1>
  <form method="post" action="{{ url_for('journal.create') }}" enctype="multipart/form-data" class="form journal-form">
    <div class="form__row">
      <div class="form__field">
        <label class="form__label" for="title">Title (optional)</label>
        <input class="form__input" type="text" id="title" name="title" placeholder="A line, a feeling, a place…" />
      </div>
      <div class="form__field">
        <label class="form__label" for="entry_type">Type</label>
        <select class="form__input" id="entry_type" name="entry_type">
          {% for t in entry_types %}
          <option value="{{ t }}" {% if t == 'thought' %}selected{% endif %}>{{ t | title }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="form__field">
      <label class="form__label" for="body">Entry</label>
      <textarea class="form__textarea form__textarea--journal" id="body" name="body" rows="14" required autofocus placeholder="Write freely. A dream, an image you can't shake, a colour, a passing wish."></textarea>
    </div>
    <div class="form__field">
      <label class="form__label" for="tags">Tags (comma-separated, optional)</label>
      <input class="form__input" type="text" id="tags" name="tags" placeholder="e.g. coastal, soft, protected" />
    </div>
    <div class="form__field">
      <label class="form__label" for="image">Image (optional)</label>
      <input class="form__input" type="file" id="image" name="image" accept="image/*" />
    </div>
    <div class="form__actions">
      <button type="submit" class="btn btn--primary">Save entry</button>
      <a href="{{ url_for('journal.index') }}" class="btn btn--ghost">Cancel</a>
    </div>
    {% if not ai_configured %}
    <p class="muted">AI suggestions are not configured for this deployment — you can still save entries.</p>
    {% endif %}
  </form>
</div>
{% endblock %}
