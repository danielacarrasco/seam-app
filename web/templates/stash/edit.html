{% extends "base.html" %}
{% block title %}Edit {{ fabric.nickname }} · Seam{% endblock %}
{% block content %}
<div class="form-page">
  <p class="breadcrumb"><a href="{{ url_for('stash.detail', fabric_id=fabric.id) }}">← {{ fabric.nickname }}</a></p>
  <h1 class="page-title">Edit fabric</h1>
  <form method="post" action="{{ url_for('stash.update', fabric_id=fabric.id) }}" class="form">
    <div class="form__field">
      <label class="form__label" for="nickname">Nickname</label>
      <input class="form__input" type="text" id="nickname" name="nickname" value="{{ fabric.nickname }}" required />
    </div>
    <div class="form__row">
      <div class="form__field">
        <label class="form__label" for="fiber_content">Fibre</label>
        <select class="form__input" id="fiber_content" name="fiber_content">
          {% for f in ['cotton','linen','wool','silk','synthetic','blend','other'] %}
          <option value="{{ f }}" {% if fabric.fiber_content == f %}selected{% endif %}>{{ f | title }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form__field">
        <label class="form__label" for="length_meters">Length (m)</label>
        <input class="form__input" type="number" step="0.1" id="length_meters" name="length_meters" value="{{ fabric.length_meters or '' }}" />
      </div>
    </div>
    <div class="form__field">
      <label class="form__label" for="notes">Notes</label>
      <textarea class="form__textarea" id="notes" name="notes" rows="4">{{ fabric.notes or '' }}</textarea>
    </div>
    <div class="form__field">
      <label class="form__label" for="care_instructions">Care instructions</label>
      <input class="form__input" type="text" id="care_instructions" name="care_instructions" value="{{ fabric.care_instructions or '' }}" />
    </div>
    <div class="form__actions">
      <button type="submit" class="btn btn--primary">Save changes</button>
      <a href="{{ url_for('stash.detail', fabric_id=fabric.id) }}" class="btn btn--ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
